<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>灰塔之契 - 经典音效版</title>
  <style>
    :root {
      --bg: #0d0f15;
      --panel: #1a1d26;
      --panel-2: #242836;
      --panel-3: #11141c;
      --line: #383e50;
      --text: #f2f2f2;
      --muted: #a8adbd;
      --danger: #cf5565;
      --gold: #d7b35a;
      --green: #75b96f;
      --blue: #7fb5e8;
      --floor: #2c303d;
      --wall: #555b6c;
      --warn: #f0b45e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(85, 92, 128, 0.4) 0%, transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(90, 50, 70, 0.24) 0%, transparent 32%),
        linear-gradient(180deg, #151823 0%, var(--bg) 60%, #07080c 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px;
    }

    .game-shell {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: minmax(330px, 590px) minmax(300px, 1fr);
      gap: 14px;
    }

    .panel {
      background: rgba(26, 29, 38, 0.96);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.38);
    }

    .map-panel { padding: 14px; }
    .side-panel { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    h1 { margin: 0 0 5px; font-size: 22px; letter-spacing: 1px; font-weight: 900; }
    .subtitle { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }

    .floor-badge {
      min-width: 76px;
      text-align: center;
      background: linear-gradient(180deg, rgba(215,179,90,0.18), rgba(215,179,90,0.06));
      border: 1px solid rgba(215,179,90,0.35);
      border-radius: 14px;
      padding: 8px;
    }
    .floor-badge b { display: block; font-size: 21px; color: #fff3bc; }
    .floor-badge span { display: block; font-size: 11px; color: var(--muted); margin-top: 1px; }

    .floor-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 9px 11px;
      margin-bottom: 12px;
      color: #e7e9f3;
      font-size: 14px;
    }
    .floor-header b { color: #fff; }
    .floor-header span { color: var(--muted); }

    .map {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 4px;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #11131a;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 7px;
      touch-action: manipulation;
      user-select: none;
    }

    .cell {
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: clamp(14px, 3vw, 22px);
      border: 1px solid rgba(255,255,255,0.055);
      transition: transform .08s ease, filter .08s ease, outline .08s ease;
      cursor: pointer;
      position: relative;
    }
    .cell:hover { filter: brightness(1.12); }
    .cell.clickable { outline: 2px solid rgba(215,179,90,0.55); outline-offset: -2px; }
    .cell.selected { box-shadow: 0 0 0 2px rgba(255,255,255,0.55) inset; }
    .cell:active { transform: scale(0.95); }

    .tile-wall { background: linear-gradient(145deg, #626777, #383c49); color: #d7dae8; cursor: help; }
    .tile-floor { background: var(--floor); color: #60677c; }
    .tile-player { background: radial-gradient(circle, #fff0a5 0%, #d5ad43 56%, #6f531b 100%); color: #1d1606; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.24); }
    .tile-door-y { background: linear-gradient(145deg, #c59a2d, #69470c); color: #fff2b0; }
    .tile-key-y { background: #403617; color: #ffd55c; }
    .tile-potion { background: #3d1720; color: #ff7888; }
    .tile-atk { background: #3e2114; color: #ff9a46; }
    .tile-def { background: #15313a; color: #78d8f0; }
    .tile-up { background: #18351e; color: #9cf49a; }
    .tile-down { background: #1b2f43; color: #9bd1ff; }
    .tile-monster { background: #371923; color: #ff7085; }
    .tile-bat { background: #2c1f42; color: #c9a5ff; }
    .tile-skeleton { background: #31323a; color: #e7e7e7; }
    .tile-zombie { background: #2a3525; color: #aad67d; }
    .tile-boss { background: linear-gradient(145deg, #5a1f2a, #251018); color: #ffccd4; box-shadow: inset 0 0 0 1px rgba(255,120,140,0.28); }
    .tile-clue { background: #2c2a17; color: #ffe18a; }
    .tile-npc { background: #1d2c32; color: #b8f4ff; }
    .tile-bell { background: #2d263b; color: #d7c4ff; }
    .tile-oneway { background: #2b2c38; color: #f0d27a; }
    .tile-polluted { background: #342638; color: #d9a4ff; }
    .tile-holy { background: #18343a; color: #bff8ff; }
    .tile-gray-infant { background: radial-gradient(circle, #5b5360, #251722); color: #fff0f6; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18); }
    .tile-redline { background: #3a1720; color: #ff9aa9; }
    .tile-registry { background: #312915; color: #ffe19a; }
    .tile-choice { background: radial-gradient(circle, #6b1d2e, #211018); color: #ffe2e7; box-shadow: inset 0 0 0 1px rgba(255,140,160,0.28); }
    .tile-tomb { background: #2b2d34; color: #d5d7df; }

    .legend {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .legend span {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 9px;
      padding: 6px;
      text-align: center;
    }

    .section-title { margin: 0 0 8px; font-size: 15px; font-weight: 900; color: #fff; display: flex; justify-content: space-between; align-items: center; }
    .section-title small { font-size: 11px; font-weight: 600; color: var(--muted); }

    .hp-card {
      background: linear-gradient(180deg, rgba(207,85,101,0.14), rgba(255,255,255,0.035));
      border: 1px solid rgba(207,85,101,0.22);
      border-radius: 13px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .hp-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; margin-bottom: 7px; }
    .hp-row b { font-size: 18px; }
    .hpbar { height: 10px; background: #151821; border-radius: 99px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
    .hpbar-fill { height: 100%; background: linear-gradient(90deg, #b84250, #ee8190); width: 50%; transition: width .16s ease; }

    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat {
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 11px;
      padding: 9px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    .stat b { color: #fff; font-size: 15px; }
    .stat span { color: var(--muted); }

    .target-card {
      background: var(--panel-3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 13px;
      padding: 10px;
      min-height: 104px;
      font-size: 13px;
      line-height: 1.55;
    }
    .target-name { font-size: 16px; font-weight: 900; color: #fff; margin-bottom: 5px; }
    .target-desc { color: var(--muted); margin-bottom: 8px; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .detail-grid div { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); padding: 6px; border-radius: 8px; color: #d8dcea; }
    .preview-safe { color: #aae8a0 !important; }
    .preview-danger { color: #ff9dab !important; }

    .log {
      background: #11131a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 13px;
      padding: 10px;
      min-height: 150px;
      max-height: 230px;
      overflow: auto;
      font-size: 13px;
      line-height: 1.55;
      color: #d7dbea;
    }
    .log p { margin: 0 0 7px; border-left: 2px solid rgba(255,255,255,0.08); padding-left: 7px; }
    .log p:last-child { margin-bottom: 0; }
    .log .bad { color: #ff9dab; border-color: #ff9dab; }
    .log .good { color: #aae8a0; border-color: #aae8a0; }
    .log .gold { color: #f2cf76; border-color: #f2cf76; }
    .log .info { color: #a8c7ff; border-color: #a8c7ff; }
    .log .battle { color: #ffc4cf; border-color: #ffc4cf; }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(3, 48px);
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }
    .ctrl-btn, .action-btn {
      border: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, #313646, #202431);
      color: #fff;
      border-radius: 11px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,0.25);
    }
    .ctrl-btn:active, .action-btn:active { transform: translateY(1px); filter: brightness(1.08); }
    .empty { visibility: hidden; }
    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .action-btn { font-size: 14px; padding: 10px; }

    .save-status {
      background: rgba(117,185,111,0.08);
      border: 1px solid rgba(117,185,111,0.18);
      color: #bde8b8;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.45;
    }

    .hint-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 13px;
      padding: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 10;
    }
    .modal {
      width: min(700px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #1c1f2b;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
    }
    .modal h2 { margin: 0 0 10px; font-size: 20px; }
    .modal p { color: #d7dbea; line-height: 1.7; margin: 0 0 14px; white-space: pre-line; }
    .book-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0 14px; }
    .book-table th, .book-table td { border: 1px solid rgba(255,255,255,0.09); padding: 7px; text-align: center; }
    .book-table th { background: rgba(255,255,255,0.06); color: #fff; }
    .book-table td { color: #d7dbea; }
    .book-table .safe { color: #aae8a0; font-weight: 700; }
    .book-table .danger { color: #ff9dab; font-weight: 700; }



    .floor-progress {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin: -4px 0 12px;
    }
    .floor-progress-fill {
      height: 100%;
      width: 5%;
      background: linear-gradient(90deg, #7c5cff, #d7b35a, #cf5565);
      box-shadow: 0 0 16px rgba(215,179,90,0.38);
      transition: width .22s ease;
    }

    @keyframes softPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.18); }
    }
    @keyframes bossPulse {
      0%, 100% { box-shadow: inset 0 0 0 1px rgba(255,120,140,0.28), 0 0 0 rgba(207,85,101,0); }
      50% { box-shadow: inset 0 0 0 1px rgba(255,120,140,0.45), 0 0 18px rgba(207,85,101,0.28); }
    }
    @keyframes modalRise {
      from { transform: translateY(10px) scale(.98); opacity: .65; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .tile-player { animation: softPulse 1.8s ease-in-out infinite; }
    .tile-boss, .tile-choice, .tile-gray-infant { animation: bossPulse 2.2s ease-in-out infinite; }
    .modal { animation: modalRise .16s ease-out; }

    .map-panel::before {
      content: '';
      display: block;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(215,179,90,0.7), rgba(207,85,101,0.75), transparent);
      margin-bottom: 10px;
    }

    .panel {
      backdrop-filter: blur(10px);
    }

    .cell::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 7px;
      pointer-events: none;
      background: linear-gradient(145deg, rgba(255,255,255,0.08), transparent 55%);
      opacity: .55;
    }

    .tile-floor::after { opacity: .18; }
    .tile-wall::after { opacity: .35; }
    .tile-key-y, .tile-atk, .tile-def, .tile-potion, .tile-holy, .tile-registry {
      box-shadow: inset 0 -8px 20px rgba(0,0,0,0.18), 0 0 10px rgba(255,255,255,0.04);
    }

    .action-btn:hover, .ctrl-btn:hover {
      filter: brightness(1.12);
      border-color: rgba(215,179,90,0.32);
    }

    .save-status {
      box-shadow: inset 0 0 18px rgba(117,185,111,0.05);
    }

    /* === Floating target/log feed on map === */
    .map-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
    }
    .map-wrap .map {
      width: 100%;
      height: 100%;
    }
    .floating-feed {
      position: absolute;
      top: 12px;
      right: 12px;
      width: min(280px, 52%);
      max-height: 58%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      pointer-events: none;
      z-index: 5;
    }
    .float-msg {
      width: 100%;
      background: rgba(15, 17, 25, .88);
      border: 1px solid rgba(255,255,255,.12);
      border-left: 3px solid rgba(215,179,90,.7);
      border-radius: 12px;
      padding: 8px 10px;
      box-shadow: 0 12px 28px rgba(0,0,0,.36);
      color: #e8ebf5;
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(8px);
      animation: floatIn .18s ease-out, floatOut .45s ease-in forwards;
      animation-delay: 0s, 3.4s;
    }
    .float-msg b { color: #fff3bc; }
    .float-msg.good { border-left-color: #83d174; }
    .float-msg.bad { border-left-color: #cf5565; }
    .float-msg.gold { border-left-color: #d7b35a; }
    .float-msg.battle { border-left-color: #ff9dab; }
    .float-msg.target { border-left-color: #78d8f0; }
    .float-msg.info { border-left-color: #a8c7ff; }
    .float-msg.leaving { opacity: 0; transform: translateX(18px); }
    .side-hidden { display: none !important; }
    @keyframes floatIn {
      from { opacity: 0; transform: translateX(22px) translateY(-4px); }
      to { opacity: 1; transform: translateX(0) translateY(0); }
    }
    @keyframes floatOut {
      to { opacity: 0; transform: translateX(18px); }
    }
    @media (max-width: 520px) {
      .floating-feed {
        top: 8px;
        right: 8px;
        width: 64%;
        max-height: 60%;
        gap: 6px;
      }
      .float-msg {
        font-size: 11px;
        padding: 7px 8px;
      }
    }

    /* === Touch pathfinding mode === */
    .touch-help {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 13px;
      padding: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .touch-help b { color: #fff3bc; }
    .cell.path-target {
      outline: 2px solid rgba(255, 227, 142, .95);
      outline-offset: -2px;
      filter: brightness(1.18);
    }
    .cell.autopath-active {
      box-shadow: inset 0 0 0 2px rgba(255,243,188,.8), 0 0 18px rgba(215,179,90,.32);
    }
    .cell.clickable {
      outline: none;
    }

    /* === UI optimization: move low-frequency actions into settings === */
    .primary-actions {
      grid-template-columns: repeat(4, 1fr);
    }
    .utility-hidden {
      display: none !important;

<style>

<style>
/* === Classic Magic Tower information display === */
.floating-feed {
  display: none !important;
}
.classic-message-line {
  margin-top: 7px;
  min-height: 32px;
  border: 2px solid #4b4e58;
  background: #11141c;
  color: #e6e1c9;
  box-shadow: inset 0 0 0 1px #222631;
  padding: 6px 9px;
  font-size: 13px;
  line-height: 1.35;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.classic-message-line b {
  color: #ffe18a;
}
.classic-message-line.bad b { color: #ff7a8c; }
.classic-message-line.battle b { color: #ff9dab; }
.classic-message-line.good b { color: #8ee58c; }
.classic-message-line.gold b { color: #ffd66b; }
.classic-message-line.target b { color: #7ecbff; }

.classic-info-panel {
  display: block;
}
.classic-target-card {
  background: #11141c !important;
  border: 2px solid #4b4e58 !important;

  padding: 8px !important;
  box-shadow: inset 0 0 0 1px #222631;
}
.classic-log {
  background: #11141c !important;
  border: 2px solid #4b4e58 !important;

  padding: 8px !important;
  box-shadow: inset 0 0 0 1px #222631;
}
.classic-log p {
  border-left: 0 !important;
  padding-left: 0 !important;
  margin-bottom: 5px !important;
}
.target-line {
  margin-bottom: 6px !important;
}
.target-art {
  width: 38px !important;
  height: 38px !important;

}
.target-name {
  font-size: 15px !important;

}
.target-desc {
  font-size: 12px !important;
  color: #c6c9d2 !important;

}
.detail-grid {

}

}
.hp-card {
  border: 2px solid #4b4e58 !important;

  box-shadow: inset 0 0 0 1px #222631;
}
.stats {
  gap: 5px !important;
}
.stat {

<style>
/* === Classic Mota cutscene/dialog presentation === */
.modal-mask {
  align-items: flex-end !important;
  padding: 12px !important;
  background: rgba(0, 0, 0, .55) !important;
}
.classic-dialog-window {
  width: min(720px, 100%) !important;
  max-width: 720px !important;
  border-radius: 4px !important;
  border: 3px solid #d7c47a !important;
  background: #10131b !important;
  box-shadow:
    0 0 0 2px #2a2211,
    0 12px 36px rgba(0,0,0,.65),
    inset 0 0 0 2px #2b303d !important;
  padding: 10px !important;
  animation: dialogSlideUp .16s ease-out;
}
.dialog-topline {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #3b3f4d;
  padding-bottom: 6px;
  margin-bottom: 8px;
}
.dialog-topline h2 {
  margin: 0 !important;
  color: #ffe18a !important;
  font-size: 16px !important;
  letter-spacing: 1px;
}
#typeSpeedLabel {
  color: #9ea6b8;
  font-size: 12px;
}
.dialog-body-wrap {
  display: grid;
  grid-template-columns: 54px 1fr;
  gap: 10px;
  align-items: stretch;
}
.dialog-portrait {
  width: 54px;
  height: 54px;
  border: 2px solid #5f667a;
  background: linear-gradient(180deg, #2b303e, #11141c);
  color: #ffe18a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 900;
  box-shadow: inset 0 0 0 1px #151923;
}
.classic-type-body {
  min-height: 76px;
  max-height: 34vh;
  overflow-y: auto;
  color: #f0ead5 !important;
  font-size: 15px !important;
  line-height: 1.75 !important;
  letter-spacing: .5px;
  padding: 2px 4px;
  white-space: pre-wrap;
}
.classic-type-body p {
  margin: 0 0 6px !important;
}
.dialog-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
  border-top: 1px solid #3b3f4d;
  padding-top: 8px;
}
#dialogHint {
  color: #aeb4c5;
  font-size: 12px;
}
.dialog-footer .action-btn {
  min-width: 76px;
}
.screen-flash {
  pointer-events: none;
  position: absolute;
  inset: 3px;
  opacity: 0;
  z-index: 5;
}
.screen-flash.active {
  animation: classicFlash .24s ease-out;
}
.screen-flash.floor.active {
  background: rgba(255, 226, 138, .26);
}
.screen-flash.battle.active {
  background: rgba(255, 80, 92, .30);
}
.screen-flash.door.active {
  background: rgba(255, 200, 90, .22);
}
.screen-flash.white.active {
  background: rgba(255,255,255,.25);
}
@keyframes classicFlash {
  0% { opacity: 0; }
  18% { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes dialogSlideUp {
  from { transform: translateY(18px); opacity: .35; }
  to { transform: translateY(0); opacity: 1; }
}
@media (max-width: 640px) {
  .modal-mask {
    padding: 8px !important;
  }
  .classic-dialog-window {
    width: 100% !important;
    padding: 8px !important;
  }
  .dialog-body-wrap {
    grid-template-columns: 44px 1fr;
    gap: 8px;
  }
  .dialog-portrait {
    width: 44px;
    height: 44px;
    font-size: 22px;
  }
  .classic-type-body {
    font-size: 14px !important;
    min-height: 72px;
    max-height: 36vh;
  }
  #dialogHint {
    display: none;
  }
}
</style>


<style>

#soundBtn {
  border-color: #d7c47a !important;
}
#soundBtn::before {
  content: "♪ ";
  color: #ffe18a;
  font-weight: 900;
}
</style>

    const initialPlayer = {
      floorIndex: 0,
      floor: 1,
      x: 1,
      y: 1,

      finalChoice: ''
    };

    let game;

    function parseMap(lines) {
      return lines.map(row => row.replace('P', 'F').split(''));
    }

    function cloneEvents(events) {
      return JSON.parse(JSON.stringify(events || {}));
    }

    function newGame() {
      const floorStates = FLOOR_DEFS.map(def => ({
        id: def.id,
        name: def.name,
        intro: def.intro,
        map: parseMap(def.map),
        visited: false,
        events: cloneEvents(def.events || {})
      }));

      game = {
        floors: floorStates,
        player: { ...initialPlayer },
        seenMonsters: new Set(),
        storyLog: [],
        startTime: Date.now(),
        ending: null,
        settings: { dangerConfirm: false },
        inspected: { x: 1, y: 1 },
        alive: true,
        finished: false,
        autoMove: null,
        logs: []
      };

      addLog('你踏入灰塔。身后的塔门缓缓合上。', 'info');
            addLog('目标信息和操作反馈会在地图右上角滚动显示并自动消失。', 'info');
            addLog('手机布局已启用：顶部状态栏、地图放大、底部核心按钮。', 'info');
      addLog('原版魔塔交互已启用：一步一格、撞格触发、弹窗锁定移动、危险战斗确认默认关闭。', 'info');
      addLog('原创复古 BGM 与音效系统已加入，可点“声音”开启。', 'info');
      addLog('经典演出已启用：剧情窗口逐字滚动，点击可加速或跳过。', 'info');
      addLog('人物与 NPC 美术已切换为经典魔塔风格：主角、老人、孤儿、骑士与幻影已重绘。', 'info');
      addLog('地图设计已切换为原版魔塔风格：房间、走廊、门钥匙与守卫点组合。', 'info');
      addLog('信息显示已切换为原版魔塔风格：状态、目标、信息栏固定显示。', 'info');
      addLog('交互规则：点击远处只查看，点击相邻格才移动。', 'info');
      addLog(`当前版本：${GAME_VERSION}`, 'info');
      enterFloor(0, { x: 1, y: 1 });
      render();
      showModal('灰塔之外', '<p>灰塔之外，雾色如铁。</p><p>领主罗维克跪在塔门前，手中攥着一枚烧焦的儿童发饰。</p><p>“找回我的妻子和女儿。”</p><p>你踏入灰塔。身后的塔门缓缓合上。</p>');
    }

    function currentFloor() {
      return game.floors[game.player.floorIndex];
    }

    function addLog(text, type = '') {
      game.logs.unshift({ text, type });
      game.logs = game.logs.slice(0, 10);
      pushFloatText(text, type || 'info');
    }

    function pushFloatText(text, type = 'info', ttl = 3800) {
      pushFloatHTML(escapeHTML(text), type, ttl);
    }

    function pushFloatHTML(html, type = 'info', ttl = 3800) {
      updateClassicMessage(html, type);
      const feed = document.getElementById('floatingFeed');
      if (!feed) return;
      const item = document.createElement('div');
      item.className = `float-msg ${type}`;
      item.innerHTML = html;
      feed.prepend(item);
      while (feed.children.length > 6) feed.lastElementChild.remove();
      setTimeout(() => item.classList.add('leaving'), Math.max(600, ttl - 450));
      setTimeout(() => item.remove(), ttl);
    }

    function updateClassicMessage(html, type = 'info') {
      const line = document.getElementById('classicMessageLine');
      if (!line) return;
      const label = type === 'bad' ? '警告' : type === 'battle' ? '战斗' : type === 'gold' ? '获得' : type === 'good' ? '成功' : type === 'target' ? '查看' : '信息';
      line.className = `classic-message-line ${type}`;
      line.innerHTML = `<b>${label}：</b>${html}`;
    }

    function render() {
      renderFloorHeader();
      renderMap();
      renderStats();
      renderTargetInfo();
      renderLog();
      updateConfirmToggleText();
      if (suppressNextAutoSave) {
        suppressNextAutoSave = false;
      } else {
        saveGame(false);
      }
    }

    function renderFloorHeader() {
      const f = currentFloor();
      document.getElementById('floorTitle').textContent = `${f.id}F`;
      document.getElementById('floorBadge').textContent = `${f.id}F`;
      document.getElementById('floorDesc').textContent = f.name;
      const progress = document.getElementById('floorProgressFill');
      if (progress) progress.style.width = `${Math.max(5, Math.min(100, Math.round((f.id / 20) * 100)))}%`;
    }

    function renderMap() {
      const mapEl = document.getElementById('map');
      mapEl.innerHTML = '';
      const floor = currentFloor();

      for (let y = 0; y < 11; y++) {
        for (let x = 0; x < 11; x++) {
          const cell = document.createElement('div');
          const isPlayer = game.player.x === x && game.player.y === y;
          const tile = isPlayer ? 'P' : floor.map[y][x];
          const info = TILE_INFO[tile] || TILE_INFO.F;

          if (isMonsterTile(tile)) game.seenMonsters.add(tile);

          cell.className = `cell ${info.cls} asset-${cssAssetKey(tile)}`;
          if (isAdjacent(x, y)) cell.classList.add('clickable');
          if (game.inspected && game.inspected.x === x && game.inspected.y === y) cell.classList.add('selected');
          if (game.autoMove && game.autoMove.target && game.autoMove.target.x === x && game.autoMove.target.y === y) cell.classList.add('path-target');
          cell.textContent = info.icon;
          cell.title = getCellTitle(tile, x, y);
          cell.dataset.x = x;
          cell.dataset.y = y;

          cell.addEventListener('mouseenter', () => inspectCell(x, y, false));
          cell.addEventListener('click', () => {
            clearAutoMove();
            if (isAdjacent(x, y)) {
              moveToAdjacent(x, y);
              return;
            }
            inspectCell(x, y, true);
            showTargetFloat(x, y);
            addLog('原版交互：只能移动到相邻格，远处格子仅用于查看。', 'info');
          });

          mapEl.appendChild(cell);
        }
      }
    }

    function getMonster(tile) {
      const base = MONSTERS[tile];
      if (!base) return null;
      const m = { ...base };
      if (m.truthWeakening) {
        const truth = game && game.player ? (game.player.truthFragments || 0) : 0;
        m.hp = Math.max(190, base.hp - truth * 28);
        m.atk = Math.max(42, base.atk - truth * 4);
        m.def = Math.max(18, base.def - truth * 2);
        m.desc = `${base.desc} 当前真相碎片：${truth}，幻影强度已被削弱。`;
      }
      if (game && game.player && game.player.soulLamp && m.undead) {
        m.atk = Math.max(1, Math.floor(m.atk * 0.9));
        m.desc = `${m.desc} 引魂灯使它的攻击降低。`;
      }
      if (game && game.player && m.endingBoss) {
        if (game.player.babyChoice === '击杀') {
          m.hp += 120;
          m.atk += 12;
          m.desc = `${m.desc} 灰婴被击杀后，怨念使它更强。`;
        } else if (game.player.babyChoice === '净化') {
          m.hp = Math.max(500, m.hp - 100);
          m.atk = Math.max(1, m.atk - 10);
          m.desc = `${m.desc} 引魂灯削弱了它的怨念。`;
        }
      }
      return m;
    }

    function getCellTitle(tile, x, y) {
      if (isMonsterTile(tile)) {
        const m = getMonster(tile);
        const p = battlePreview(m);
        return `${m.name} HP:${m.hp} ATK:${m.atk} DEF:${m.def} 预计损血:${p.loss}`;
      }
      const info = TILE_INFO[tile] || TILE_INFO.F;
      return `${info.name} (${x}, ${y})`;
    }

    function inspectCell(x, y, rerender = true) {
      game.inspected = { x, y };
      if (rerender) render();
      else renderTargetInfo();
    }

    function renderStats() {
      const p = game.player;
      const hpPercent = Math.max(3, Math.min(100, Math.round((p.hp / 1600) * 100)));
      document.getElementById('hpCard').innerHTML = `
        <div class="hp-card">
          <div class="hp-row"><span>生命 HP</span><b>${p.hp}</b></div>
          <div class="hpbar"><div class="hpbar-fill" style="width:${hpPercent}%"></div></div>
        </div>
      `;

      const stats = [
        ['攻击', p.atk],
        ['防御', p.def],
        ['金币', p.gold],
        ['经验', p.exp],
        ['黄钥匙', p.yellowKeys],
        ['真相碎片', p.truthFragments || 0],
        ['罪痕', p.sin || 0],
        ['圣水', p.holyWater || 0],
        ['灰婴', p.babyChoice || '未定'],
        ['最终选择', p.finalChoice || '未定'],
        ['击杀', p.kills],
        ['累计损血', p.totalDamageTaken],
        ['已见怪物', game.seenMonsters.size]
      ];
      document.getElementById('stats').innerHTML = stats.map(([k, v]) => `
        <div class="stat"><span>${k}</span><b>${v}</b></div>
      `).join('');

      const mobileHud = document.getElementById('mobileHud');
      if (mobileHud) {
        mobileHud.innerHTML = `
          <div class="mobile-chip floor">层数<b>${currentFloor().id}F</b></div>
          <div class="mobile-chip hp">生命<b>${p.hp}</b></div>
          <div class="mobile-chip">攻击<b>${p.atk}</b></div>
          <div class="mobile-chip">防御<b>${p.def}</b></div>
          <div class="mobile-chip key">钥匙<b>${p.yellowKeys}</b></div>
        `;
      }
    }

    function renderTargetInfo() {
      const target = game.inspected || { x: game.player.x, y: game.player.y };
      const isPlayer = target.x === game.player.x && target.y === game.player.y;
      const floor = currentFloor();
      const tile = isPlayer ? 'P' : floor.map[target.y][target.x];
      const targetInfo = document.getElementById('targetInfo');

      if (isMonsterTile(tile)) {
        const m = getMonster(tile);
        const p = battlePreview(m);
        const lossClass = p.canWin ? 'preview-safe' : 'preview-danger';
        targetInfo.innerHTML = `
          <div class="target-line">${assetPreviewHTML(tile)}<div class="target-title-wrap"><div class="target-name">${m.name}</div><div class="target-desc">${m.desc}</div></div></div>
          <div class="detail-grid">
            <div>HP：${m.hp}</div>
            <div>攻击：${m.atk}</div>
            <div>防御：${m.def}</div>
            <div>奖励：${m.gold}金 / ${m.exp}经验</div>
            <div>回合：${p.rounds}</div>
            <div class="${lossClass}">${p.canWin ? `预计损血：${p.loss}` : `不可击败：需承受 ${p.loss}`}</div>
          </div>
        `;
        return;
      }

      const info = TILE_INFO[tile] || TILE_INFO.F;
      let extra = '';
      if (tile === TILE.DOOR_YELLOW) extra = game.player.yellowKeys > 0 ? '你有黄钥匙，可以打开。' : '你没有黄钥匙，暂时无法打开。';
      if (tile === TILE.UP) extra = game.player.floorIndex >= game.floors.length - 1 ? '这是当前原型的终点。' : '进入上一层。';
      if (tile === TILE.DOWN) extra = game.player.floorIndex <= 0 ? '塔门已关闭，无法离开。' : '返回下一层，状态会保留。';

      targetInfo.innerHTML = `
        <div class="target-line">${assetPreviewHTML(tile)}<div class="target-title-wrap"><div class="target-name">${info.name}</div><div class="target-desc">${info.desc || ''}</div></div></div>
        <div class="detail-grid">
          <div>坐标：${target.x}, ${target.y}</div>
          <div>距离：${Math.abs(target.x - game.player.x) + Math.abs(target.y - game.player.y)}</div>
          <div>相邻：${isAdjacent(target.x, target.y) ? '是' : '否'}</div>
          <div>${extra || '无特殊效果'}</div>
        </div>
      `;
    }

    function renderLog() {
      document.getElementById('log').innerHTML = game.logs.map(item => `<p class="${item.type}">${escapeHTML(item.text)}</p>`).join('');
    }

    function isAdjacent(x, y) {
      const dx = Math.abs(x - game.player.x);
      const dy = Math.abs(y - game.player.y);
      return dx + dy === 1;
    }

    function moveToAdjacent(x, y) {
      tryMove(x - game.player.x, y - game.player.y);
    }

    function isMonsterTile(tile) {
      return Object.prototype.hasOwnProperty.call(MONSTERS, tile);
    }

    function cssAssetKey(tile) {
      return String(tile || 'F').replace(/[^a-zA-Z0-9_-]/g, 'F');
    }

    function assetPreviewHTML(tile) {
      const key = cssAssetKey(tile);
      return `<div class="target-art target-art-${key}"></div>`;
    }


    function showTargetFloat(x, y) {
      if (!game || !currentFloor()) return;
      const floor = currentFloor();
      const isPlayer = x === game.player.x && y === game.player.y;
      const tile = isPlayer ? 'P' : floor.map[y][x];
      if (isMonsterTile(tile)) {
        const m = getMonster(tile);
        const p = battlePreview(m);
        pushFloatHTML(`<b>${escapeHTML(m.name)}</b><br>HP ${m.hp} / 攻 ${m.atk} / 防 ${m.def}<br>${p.canWin ? `预计损血 ${p.loss}` : `不可击败，需承受 ${p.loss}`}`, p.canWin ? 'target' : 'bad', 3300);
        return;
      }
      const info = TILE_INFO[tile] || TILE_INFO.F;
      let extra = '';
      if (tile === TILE.DOOR_YELLOW) extra = game.player.yellowKeys > 0 ? '可打开：消耗 1 黄钥匙。' : '钥匙不足，无法通过。';
      else if (tile === TILE.UP) extra = '上楼梯：进入上一层。';
      else if (tile === TILE.DOWN) extra = game.player.floorIndex <= 0 ? '塔门已关闭，无法离开。' : '下楼梯：返回下一层。';
      else if (tile === TILE.WALL) extra = '墙体阻挡，无法通过。';
      else extra = info.desc || '可以通行。';
      pushFloatHTML(`<b>${escapeHTML(info.name)}</b><br>${escapeHTML(extra)}<br>坐标：${x},${y}`, tile === TILE.WALL ? 'bad' : 'target', 3000);
    }


    function clearAutoMove() {
      if (game && game.autoMove && game.autoMove.timer) clearTimeout(game.autoMove.timer);
      if (game) game.autoMove = null;
    }

    function startAutoMoveTo(x, y) {
      if (!game.alive || game.finished) return;
      clearAutoMove();
      game.inspected = { x, y };
      showTargetFloat(x, y);
      if (x === game.player.x && y === game.player.y) {
        render();
        return;
      }
      const path = findAutoPath(x, y);
      if (!path || !path.length) {
        addLog('无法自动移动到该位置：路线被墙、门或强敌阻挡。', 'bad');
        render();
        return;
      }
      game.autoMove = { path, target: { x, y }, timer: null };
      addLog(`自动移动：目标 ${x},${y}，预计 ${path.length} 步。`, 'info');
      render();
      continueAutoMove();
    }

    function continueAutoMove() {
      if (!game.autoMove || !game.autoMove.path.length || !game.alive || game.finished) {
        clearAutoMove();
        render();
        return;
      }
      if (document.getElementById('modalMask').style.display === 'flex') {
        clearAutoMove();
        return;
      }
      const next = game.autoMove.path.shift();
      const before = { x: game.player.x, y: game.player.y, floorIndex: game.player.floorIndex };
      tryMove(next.x - game.player.x, next.y - game.player.y);
      game.autoMove.timer = setTimeout(() => {
        if (!game.autoMove) return;
        const moved = game.player.x !== before.x || game.player.y !== before.y || game.player.floorIndex !== before.floorIndex;
        const blockedByModal = document.getElementById('modalMask').style.display === 'flex';
        if (!moved || blockedByModal || before.floorIndex !== game.player.floorIndex) {
          clearAutoMove();
          render();
          return;
        }
        continueAutoMove();
      }, 155);
    }

    function findAutoPath(targetX, targetY) {
      const floor = currentFloor();
      if (targetY < 0 || targetY >= 11 || targetX < 0 || targetX >= 11) return null;
      const startState = {
        x: game.player.x,
        y: game.player.y,
        hp: game.player.hp,
        atk: game.player.atk,
        def: game.player.def,
        keys: game.player.yellowKeys
      };
      const queue = [{ ...startState, path: [] }];
      const seen = new Set([pathStateKey(startState)]);
      const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
      while (queue.length) {
        const cur = queue.shift();
        if (cur.x === targetX && cur.y === targetY) return cur.path;
        const currentTile = floor.map[cur.y][cur.x];
        for (const [dx, dy] of dirs) {
          if (currentTile === TILE.ONEWAY && dx !== 1) continue;
          const nx = cur.x + dx;
          const ny = cur.y + dy;
          if (ny < 0 || ny >= 11 || nx < 0 || nx >= 11) continue;
          const tile = floor.map[ny][nx];
          const isTarget = nx === targetX && ny === targetY;
          const nextState = simulatePathStep(tile, cur, dx, isTarget);
          if (!nextState) continue;
          nextState.x = nx;
          nextState.y = ny;
          nextState.path = cur.path.concat({ x: nx, y: ny });
          const key = pathStateKey(nextState);
          if (seen.has(key)) continue;
          seen.add(key);
          queue.push(nextState);
        }
      }
      return null;
    }

    function pathStateKey(s) {
      return `${s.x},${s.y},${Math.min(s.keys, 9)},${s.atk},${s.def},${Math.floor(s.hp / 100)}`;
    }

    function simulatePathStep(tile, state, dx, isTarget) {
      if (tile === TILE.WALL) return null;
      const next = { x: state.x, y: state.y, hp: state.hp, atk: state.atk, def: state.def, keys: state.keys };
      if ((tile === TILE.UP || tile === TILE.DOWN || tile === TILE.GRAY_INFANT || tile === TILE.FINAL_CORE || tile === TILE.REDLINE) && !isTarget) return null;
      if (tile === TILE.DOOR_YELLOW) {
        if (next.keys <= 0) return null;
        next.keys -= 1;
        return next;
      }
      if (tile === TILE.ONEWAY && dx !== 1) return null;
      if (isMonsterTile(tile)) {
        const m = simulateMonsterForState(tile, next);
        const preview = simulateBattleForState(m, next);
        if (!preview.canWin) return null;
        if ((!game.settings || game.settings.dangerConfirm) && preview.loss >= Math.max(250, Math.floor(state.hp * 0.25))) return isTarget ? next : null;
        next.hp -= preview.loss;
        return next;
      }
      if (tile === TILE.KEY_YELLOW) next.keys += 1;
      if (tile === TILE.POTION) next.hp += 200;
      if (tile === TILE.POLLUTED) next.hp += 420;
      if (tile === TILE.ATK_GEM) next.atk += 3;
      if (tile === TILE.DEF_GEM) next.def += 3;
      return next;
    }

    function simulateMonsterForState(tile, state) {
      const base = MONSTERS[tile];
      if (!base) return null;
      const m = { ...base };
      if (m.truthWeakening) {
        const truth = game.player.truthFragments || 0;
        m.hp = Math.max(190, base.hp - truth * 28);
        m.atk = Math.max(42, base.atk - truth * 4);
        m.def = Math.max(18, base.def - truth * 2);
      }
      if (game.player.soulLamp && m.undead) m.atk = Math.max(1, Math.floor(m.atk * 0.9));
      if (m.endingBoss) {
        if (game.player.babyChoice === '击杀') { m.hp += 120; m.atk += 12; }
        if (game.player.babyChoice === '净化') { m.hp = Math.max(500, m.hp - 100); m.atk = Math.max(1, m.atk - 10); }
      }
      return m;
    }

    function simulateBattleForState(monster, state) {
      const playerDamage = Math.max(state.atk - monster.def, 1);
      const monsterDamage = Math.max(monster.atk - state.def, 0);
      const rounds = Math.ceil(monster.hp / playerDamage);
      const loss = monsterDamage * Math.max(rounds - 1, 0);
      return { rounds, loss, canWin: state.hp > loss };
    }

    function tryMove(dx, dy) {
      if (isModalOpen()) return;
      if (!game.alive || game.finished) return;

      const nx = game.player.x + dx;
      const ny = game.player.y + dy;
      const floor = currentFloor();

      if (ny < 0 || ny >= 11 || nx < 0 || nx >= 11) return;
      const tile = floor.map[ny][nx];
      const currentTile = floor.map[game.player.y][game.player.x];
      game.inspected = { x: nx, y: ny };

      if (currentTile === TILE.ONEWAY && dx !== 1) {
        addLog('单向门锁住了退路，只能继续向右。', 'bad');
        render();
        return;
      }

      if (tile === TILE.WALL) {
        addLog('这里是墙，无法通过。');
        render();
        return;
      }

      if (tile === TILE.DOOR_YELLOW) {
        if (game.player.yellowKeys <= 0) {
          addLog('黄钥匙不足，无法打开黄门。', 'bad');
          render();
          return;
        }
        game.player.yellowKeys -= 1;
        game.player.openedDoors += 1;
        floor.map[ny][nx] = TILE.FLOOR;
        addLog('消耗 1 把黄钥匙，打开黄门。', 'gold');
        movePlayer(nx, ny);
        return;
      }

      if (isMonsterTile(tile)) {
        if (shouldConfirmBattle(tile)) {
          showBattleConfirm(tile, nx, ny);
        } else {
          fightMonster(tile, nx, ny);
        }
        return;
      }

      if (tile === TILE.KEY_YELLOW) {
        game.player.yellowKeys += 1;
        game.player.collectedItems += 1;
        floor.map[ny][nx] = TILE.FLOOR;
        addLog('获得 1 把黄钥匙。', 'gold');
        movePlayer(nx, ny);
        return;
      }

      if (tile === TILE.POTION) {
        game.player.hp += 200;
        game.player.collectedItems += 1;
        floor.map[ny][nx] = TILE.FLOOR;
        addLog('喝下小血瓶，生命 +200。', 'good');
        movePlayer(nx, ny);
        return;
      }

      if (tile === TILE.ATK_GEM) {
        game.player.atk += 3;
        game.player.collectedItems += 1;
        floor.map[ny][nx] = TILE.FLOOR;
        playSfx('pickup');
      addLog('获得攻击宝石，攻击 +3。', 'good');
        movePlayer(nx, ny);
        return;
      }

      if (tile === TILE.DEF_GEM) {
        game.player.def += 3;
        game.player.collectedItems += 1;
        floor.map[ny][nx] = TILE.FLOOR;
        playSfx('pickup');
      addLog('获得防御宝石，防御 +3。', 'good');
        movePlayer(nx, ny);
        return;
      }

      if (tile === TILE.ONEWAY) {
        if (dx === 1) {
          addLog('你穿过单向门。身后的门锁死了。', 'info');
          movePlayer(nx, ny);
        } else {
          addLog('这道单向门只能从左向右通过。', 'bad');
          render();
        }
        return;
      }

      if (tile === TILE.BELL) {
        movePlayer(nx, ny);
        triggerBellAt(nx, ny);
        return;
      }

      if (tile === TILE.CLUE || tile === TILE.NPC) {
        movePlayer(nx, ny);
        triggerEventAt(nx, ny);
        return;
      }

      if (tile === TILE.POLLUTED) {
        game.player.hp += 420;
        game.player.sin = (game.player.sin || 0) + 1;
        game.player.collectedItems += 1;
        floor.map[ny][nx] = TILE.FLOOR;
        addLog('饮下污染血瓶，生命 +420，罪痕 +1。', 'battle');
        movePlayer(nx, ny);
        return;
      }

      if (tile === TILE.HOLY_WATER) {
        game.player.holyWater = (game.player.holyWater || 0) + 1;
        game.player.collectedItems += 1;
        floor.map[ny][nx] = TILE.FLOOR;
        addLog('获得圣水。它可以用于净化灰婴。', 'good');
        movePlayer(nx, ny);
        return;
      }

      if (tile === TILE.GRAY_INFANT) {
        triggerGrayInfant(nx, ny);
        return;
      }

      if (tile === TILE.REDLINE) {
        triggerRedLineDoor(nx, ny);
        return;
      }

      if (tile === TILE.REGISTRY) {
        game.player.orphanLedger = true;
        game.player.collectedItems += 1;
        floor.map[ny][nx] = TILE.FLOOR;
        addStory('孤儿名册', '名册上写满了被红线牵走的孩子姓名。现在，最终选择不再只是抽象的道德题。');
        addLog('获得孤儿名册。', 'gold');
        movePlayer(nx, ny);
        return;
      }

      if (tile === TILE.FINAL_CORE) {
        triggerFinalChoice(nx, ny);
        return;
      }

      if (tile === TILE.UP) {
        if (game.player.floorIndex >= game.floors.length - 1) {
          movePlayer(nx, ny);
          game.finished = true;
          addLog('你抵达灰塔断层。第十阶段测试完成。', 'gold');
          showModal('阶段完成', '<p>你已经完成第十阶段测试。</p><p>本版重点是 19—20 层后果结算：条件 Boss、四结局和通关总结。</p>');
          render();
          return;
        }
        changeFloor(1);
        return;
      }

      if (tile === TILE.DOWN) {
        if (game.player.floorIndex <= 0) {
          addLog('塔门已关闭，无法回到塔外。', 'bad');
          render();
          return;
        }
        changeFloor(-1);
        return;
      }

      movePlayer(nx, ny);
    }

    function shouldConfirmBattle(tile) {
      if (!game.settings || !game.settings.dangerConfirm) return false;
      const monster = getMonster(tile);
      if (!monster) return false;
      const preview = battlePreview(monster);
      if (!preview.canWin) return false;
      return preview.loss >= Math.max(250, Math.floor(game.player.hp * 0.25));
    }

    function showBattleConfirm(tile, x, y) {
      const monster = getMonster(tile);
      const preview = battlePreview(monster);
      showModal('危险战斗确认', `
        <p>即将与 ${monster.icon} ${monster.name} 战斗。</p>
        <table class="book-table">
          <tr><th>怪物 HP</th><td>${monster.hp}</td></tr>
          <tr><th>怪物攻击</th><td>${monster.atk}</td></tr>
          <tr><th>怪物防御</th><td>${monster.def}</td></tr>
          <tr><th>预计回合</th><td>${preview.rounds}</td></tr>
          <tr><th>预计损血</th><td>${preview.loss}</td></tr>
        </table>
        <div class="actions" style="margin:10px 0;">
          <button class="action-btn" id="confirmFightBtn">确认战斗</button>
          <button class="action-btn" id="cancelFightBtn">取消</button>
        </div>
      `);
      setTimeout(() => {
        const ok = document.getElementById('confirmFightBtn');
        const cancel = document.getElementById('cancelFightBtn');
        if (ok) ok.onclick = () => { hideModal(); fightMonster(tile, x, y); };
        if (cancel) cancel.onclick = () => { hideModal(); addLog('已取消危险战斗。', 'info'); render(); };
      }, 0);
    }

    function fightMonster(tile, x, y) {
      const floor = currentFloor();
      const monster = getMonster(tile);
      game.seenMonsters.add(tile);
      const result = battlePreview(monster);

      addLog(`遭遇 ${monster.name}：预计损血 ${result.loss}，战斗回合 ${result.rounds}。`, 'battle');

      if (!result.canWin) {
        addLog(`无法击败 ${monster.name}：当前生命 ${game.player.hp}，预计损血 ${result.loss}。`, 'bad');
        render();
        return;
      }

      game.player.hp -= result.loss;
      game.player.totalDamageTaken += result.loss;
      game.player.gold += monster.gold;
      game.player.exp += monster.exp;
      game.player.kills += 1;
      floor.map[y][x] = TILE.FLOOR;

      addLog(`击败 ${monster.name}，损失 ${result.loss} HP，获得 ${monster.gold} 金币、${monster.exp} 经验。`, 'good');
      let endingData = null;
      if (monster.boss && monster.endingBoss) {
        endingData = prepareEnding(monster);
        addStory(endingData.title, endingData.summary);
        addLog(`结局达成：${endingData.title}`, 'gold');
      } else if (monster.boss && monster.finalReversalBoss) {
        game.player.truthFragments = (game.player.truthFragments || 0) + 1;
        addStory('罗维克毁约真相', '旧日骑士幻影碎裂后，记忆露出原貌：罗维克曾用未出生的孩子换取权力，又在代价到来时毁约。');
        addLog('获得关键真相：罗维克曾签下契约，又亲手毁约。', 'gold');
      } else if (monster.boss) {
        game.player.truthFragments = (game.player.truthFragments || 0) + 1;
        addStory('断誓守卫', '断誓守卫倒下前说：她们不是被抓走的。她们是逃进来的。');
        addLog('获得关键真相：她们不是被抓走的，她们是逃进来的。', 'gold');
      }
      if (endingData) {
        game.finished = true;
        game.ending = endingData.title;
      }
      movePlayer(x, y);
      if (endingData) {
        showEndingModal(endingData);
      } else if (monster.boss && monster.finalReversalBoss) {
        showModal('记忆审判厅', '<p>幻影跪倒在审判厅中央。</p><p>你终于看见契约的原文：以未见天日之子，换取灰鸦镇的统治权。</p><p>罗维克不是单纯的受害者。他是毁约者，也是灾难的开端。</p>');
      } else if (monster.boss) {
        showModal('断誓守卫', '<p>守卫的盔甲碎裂，里面没有身体，只有一枚染血的誓约印记。</p><p>“她们不是被抓走的。”</p><p>“她们是逃进来的。”</p>');
      }
    }

    function movePlayer(x, y) {
      game.player.x = x;
      game.player.y = y;
      game.inspected = { x, y };
      render();
    }

    function battlePreview(monster) {
      const p = game.player;
      const playerDamage = Math.max(p.atk - monster.def, 1);
      const monsterDamage = Math.max(monster.atk - p.def, 0);
      const rounds = Math.ceil(monster.hp / playerDamage);
      const loss = monsterDamage * Math.max(rounds - 1, 0);
      return { playerDamage, monsterDamage, rounds, loss, canWin: p.hp > loss };
    }

    function findTile(map, tile) {
      for (let y = 0; y < map.length; y++) {
        for (let x = 0; x < map[y].length; x++) {
          if (map[y][x] === tile) return { x, y };
        }
      }
      return null;
    }

    function findAdjacentWalkable(map, pos) {
      const candidates = [
        { x: pos.x + 1, y: pos.y },
        { x: pos.x - 1, y: pos.y },
        { x: pos.x, y: pos.y + 1 },
        { x: pos.x, y: pos.y - 1 }
      ];
      return candidates.find(p => {
        if (!p || p.x < 0 || p.y < 0 || p.y >= map.length || p.x >= map[p.y].length) return false;
        return map[p.y][p.x] !== TILE.WALL;
      }) || pos;
    }

    function changeFloor(direction) {
      const oldFloor = currentFloor();
      const oldId = oldFloor.id;
      const nextIndex = game.player.floorIndex + direction;
      enterFloor(nextIndex, null, direction);
      const newFloor = currentFloor();
      addLog(direction > 0 ? `你从 ${oldId}F 登上 ${newFloor.id}F。` : `你从 ${oldId}F 返回 ${newFloor.id}F。`, 'info');
      render();
    }

    function enterFloor(index, fixedPosition = null, direction = 0) {
      game.player.floorIndex = index;
      const floor = currentFloor();
      applyConditionalFloor(floor);
      game.player.floor = floor.id;

      if (!floor.visited) {
        floor.visited = true;
        addLog(floor.intro, 'info');
      }

      if (fixedPosition) {
        game.player.x = fixedPosition.x;
        game.player.y = fixedPosition.y;
        game.inspected = { ...fixedPosition };
        return;
      }

      if (direction > 0) {
        const down = findTile(floor.map, TILE.DOWN);
        const pos = down ? findAdjacentWalkable(floor.map, down) : { x: 1, y: 1 };
        game.player.x = pos.x;
        game.player.y = pos.y;
        game.inspected = { ...pos };
      } else if (direction < 0) {
        const up = findTile(floor.map, TILE.UP);
        const pos = up ? findAdjacentWalkable(floor.map, up) : { x: 1, y: 1 };
        game.player.x = pos.x;
        game.player.y = pos.y;
        game.inspected = { ...pos };
      }
    }

    function applyConditionalFloor(floor) {
      if (!floor) return;
      if (floor.id === 19 && !floor.afterApplied) {
        floor.afterApplied = true;
        if (game.player.finalChoice === '救妻女') {
          placeIfFloor(floor, 2, 3, 'u');
          placeIfFloor(floor, 8, 7, 'u');
          addStory('后果回廊', '红线污染了回廊。被献祭的孩子变成童影，挡住继续前进的路。');
        } else {
          placeIfFloor(floor, 2, 3, TILE.TOMB);
          placeIfFloor(floor, 8, 7, TILE.TOMB);
          addStory('后果回廊', '回廊里立起白色墓碑。孤儿获救，但伊莲与米娅的影子正在消散。');
        }
      }
      if (floor.id === 20 && !floor.finalBossApplied) {
        floor.finalBossApplied = true;
        if (game.player.finalChoice === '救妻女') {
          replaceTile(floor, 'f', 'h');
        }
      }
    }

    function placeIfFloor(floor, x, y, tile) {
      if (floor.map[y] && floor.map[y][x] === TILE.FLOOR) floor.map[y][x] = tile;
    }

    function replaceTile(floor, from, to) {
      for (let y = 0; y < floor.map.length; y++) {
        for (let x = 0; x < floor.map[y].length; x++) {
          if (floor.map[y][x] === from) floor.map[y][x] = to;
        }
      }
    }

    function prepareEnding(monster) {
      const baby = game.player.babyChoice;
      const finalChoice = game.player.finalChoice;
      if (finalChoice === '救孤儿' && baby === '击杀') {
        return {
          title: '灰烬下的善行',
          summary: '你救下了孤儿，但灰婴被你亲手击杀，罗维克失去妻女后在绝望中退场。',
          text: '<p>孤儿们离开了红线梦境。</p><p>伊莲和米娅的影子彻底消散。</p><p>罗维克跪在塔门外，没有哭，也没有呼喊。他只是把染血家徽放在地上。</p><p>你救下了许多人。只是他想救的人，不在其中。</p>'
        };
      }
      if (finalChoice === '救孤儿' && baby === '净化') {
        return {
          title: '雾中的赎罪',
          summary: '你救下孤儿，也让灰婴化作引魂灯。罗维克失去妻女，却被迫真正面对自己的罪。',
          text: '<p>孤儿们获救，灰塔低层的哭声渐渐平息。</p><p>伊莲死去，米娅陷入沉睡。</p><p>罗维克抱着引魂灯走进灰雾，像是在寻找永远无法抵达的家。</p><p>你没有原谅他，但你让他终于看见自己欠下的债。</p>'
        };
      }
      if (finalChoice === '救妻女' && baby === '击杀') {
        return {
          title: '完成契约',
          summary: '你完成委托，救出妻女，但灰婴与孤儿的怨念让灰塔污染扩散。',
          text: '<p>罗维克带走了伊莲和米娅。</p><p>孤儿们被红线拖入墙中，变成新的童影。</p><p>灰烬之钥在你掌心裂开，里面传出孩子的哭声。</p><p>你完成了任务。可这份报酬，从一开始就不是由他支付的。</p>'
        };
      }
      return {
        title: '残缺的希望',
        summary: '你救出罗维克妻女，也净化了灰婴。孤儿仍被牺牲，但米娅保留了一点自我。',
        text: '<p>伊莲和米娅被带离灰塔。</p><p>孤儿们仍然被献祭，红线在塔壁深处缓慢蠕动。</p><p>许久以后，你收到一封没有署名的信：她今天看了我一眼。我不知道那是不是原谅。</p><p>这不是胜利，只是一点残缺的希望。</p>'
      };
    }

    function showEndingModal(ending) {
      const p = game.player;
      const elapsed = formatDuration(Date.now() - (game.startTime || Date.now()));
      showModal(ending.title, `
        ${ending.text}
        <table class="book-table">
          <tr><th>通关时间</th><td>${elapsed}</td></tr>
          <tr><th>击杀怪物</th><td>${p.kills}</td></tr>
          <tr><th>真相碎片</th><td>${p.truthFragments || 0}</td></tr>
          <tr><th>罪痕</th><td>${p.sin || 0}</td></tr>
          <tr><th>灰婴选择</th><td>${p.babyChoice || '未定'}</td></tr>
          <tr><th>最终选择</th><td>${p.finalChoice || '未定'}</td></tr>
        </table>
        <p>${ending.summary}</p>
      `);
    }

    function formatDuration(ms) {
      const total = Math.max(0, Math.floor(ms / 1000));
      const min = Math.floor(total / 60);
      const sec = total % 60;
      return `${min}分${String(sec).padStart(2, '0')}秒`;
    }

    function applyBlessing(type) {
      if (type === 'bone') {
        game.player.def += 8;
        game.player.sin = (game.player.sin || 0) + 1;
        addLog('接受骨姥祝福：防御 +8，罪痕 +1。', 'battle');
      } else if (type === 'blood') {
        game.player.hp += 700;
        game.player.sin = (game.player.sin || 0) + 1;
        addLog('接受血姥祝福：生命 +700，罪痕 +1。', 'battle');
      } else if (type === 'dream') {
        game.player.truthFragments = (game.player.truthFragments || 0) + 1;
        game.player.sin = (game.player.sin || 0) + 1;
        addLog('接受梦姥祝福：真相碎片 +1，罪痕 +1。', 'battle');
      }
    }

    function triggerRedLineDoor(x, y) {
      const floor = currentFloor();
      if (!floor.redLineUsed) {
        floor.redLineUsed = true;
        for (let yy = 0; yy < floor.map.length; yy++) {
          for (let xx = 0; xx < floor.map[yy].length; xx++) {
            if (floor.map[yy][xx] === TILE.REDLINE && !(xx === x && yy === y)) {
              floor.map[yy][xx] = TILE.WALL;
            }
          }
        }
        floor.map[y][x] = TILE.FLOOR;
        addLog('你开启一扇红线门，其他红线门被封死。', 'battle');
        movePlayer(x, y);
      } else {
        addLog('红线已经收紧，无法再选择另一扇门。', 'bad');
        render();
      }
    }

    function triggerFinalChoice(x, y) {
      if (game.player.finalChoice) {
        addLog('最终选择已经完成。', 'info');
        return;
      }
      const ledgerText = game.player.orphanLedger ? '你已经读过孤儿名册，知道每一个被牺牲者都有名字。' : '你没有找到完整名册，但仍能听见孩子们的祈祷声。';
      const babyText = game.player.babyChoice === '净化' ? '引魂灯在你手中微弱发亮。' : game.player.babyChoice === '击杀' ? '灰烬之钥在你手中发烫。' : '灰婴的哭声仍在远处回荡。';
      showModal('红线核心', `
        <p>${ledgerText}</p>
        <p>${babyText}</p>
        <p>织命三姥给出最后的条件：救孤儿，伊莲与米娅的契约生命会断裂；救妻女，孤儿会被献祭给灰塔。</p>
        <div class="actions" style="margin:10px 0;">
          <button class="action-btn" id="saveOrphansBtn">救孤儿</button>
          <button class="action-btn" id="saveFamilyBtn">救妻女</button>
        </div>
        <p>这是不可逆选择。</p>
      `);
      setTimeout(() => {
        const a = document.getElementById('saveOrphansBtn');
        const b = document.getElementById('saveFamilyBtn');
        if (a) a.onclick = () => resolveFinalChoice('救孤儿', x, y);
        if (b) b.onclick = () => resolveFinalChoice('救妻女', x, y);
      }, 0);
    }

    function resolveFinalChoice(choice, x, y) {
      saveCheckpoint('最终选择前');
      const floor = currentFloor();
      game.player.finalChoice = choice;
      floor.map[y][x] = TILE.FLOOR;
      if (choice === '救孤儿') {
        addStory('最终选择：救孤儿', '你剪断通向孤儿的红线。伊莲与米娅的契约开始崩解，罗维克的愿望注定破灭。');
        addLog('最终选择：救孤儿。伊莲与米娅的契约生命将断裂。', 'gold');
        hideModal();
        movePlayer(x, y);
        showModal('救孤儿', '<p>红线断开，孩子们的影子从空中落下。</p><p>远处，伊莲和米娅的身影开始变淡。</p>');
      } else {
        game.player.sin = (game.player.sin || 0) + 2;
        addStory('最终选择：救妻女', '你剪断通向伊莲与米娅的红线。罗维克的委托得以完成，但孤儿的影子被红线拖入塔壁。');
        addLog('最终选择：救妻女。孤儿被献祭，罪痕 +2。', 'battle');
        hideModal();
        movePlayer(x, y);
        showModal('救妻女', '<p>伊莲和米娅的影子跌落在地。</p><p>与此同时，孤儿们的祈祷声被红线吞没。</p>');
      }
    }

    function triggerGrayInfant(x, y) {
      if (game.player.babyChoice) {
        addLog('灰婴已经被处理。', 'info');
        return;
      }
      const canPurify = (game.player.holyWater || 0) >= 1 && (game.player.truthFragments || 0) >= 5;
      showModal('灰婴', `
        <p>灰色胎茧轻轻晃动。一个孩子的声音从里面传来：</p>
        <p>“父亲……为什么不要我？”</p>
        <p>你可以直接击杀它，立刻获得奖励；也可以消耗圣水与真相，尝试净化它。</p>
        <div class="actions" style="margin:10px 0;">
          <button class="action-btn" id="killBabyBtn">击杀灰婴</button>
          <button class="action-btn" id="purifyBabyBtn">净化灰婴</button>
        </div>
        <p>${canPurify ? '净化条件满足：圣水 ≥1，真相碎片 ≥5。' : '净化条件不足：需要圣水 ≥1，真相碎片 ≥5。'}</p>
      `);
      setTimeout(() => {
        const killBtn = document.getElementById('killBabyBtn');
        const purifyBtn = document.getElementById('purifyBabyBtn');
        if (killBtn) killBtn.onclick = () => resolveGrayInfant('kill', x, y);
        if (purifyBtn) purifyBtn.onclick = () => resolveGrayInfant('purify', x, y);
      }, 0);
    }

    function resolveGrayInfant(choice, x, y) {
      saveCheckpoint('灰婴选择前');
      const floor = currentFloor();
      if (choice === 'purify') {
        if ((game.player.holyWater || 0) < 1 || (game.player.truthFragments || 0) < 5) {
          addLog('净化条件不足，无法安抚灰婴。', 'bad');
          showModal('净化失败', '<p>你缺少圣水，或尚未收集足够真相。</p><p>灰婴仍在胎室中央哭泣。</p>');
          render();
          return;
        }
        game.player.holyWater -= 1;
        playSfx('choice');
        game.player.babyChoice = '净化';
        game.player.soulLamp = true;
        floor.map[y][x] = TILE.FLOOR;
        addStory('净化灰婴', '你没有杀死灰婴，而是用圣水和已知真相安抚它。灰婴化作引魂灯，微弱地照亮前路。');
        addLog('你净化了灰婴，获得引魂灯。亡灵类怪物攻击降低。', 'good');
        hideModal();
        movePlayer(x, y);
        showModal('引魂灯', '<p>哭声停止了。</p><p>灰婴没有消失，而是化作一盏微弱的引魂灯。</p><p>它不会让过去变好，但会让你看清后面的路。</p>');
      } else {
        playSfx('choice');
        game.player.babyChoice = '击杀';
        game.player.ashKey = true;
        game.player.sin = (game.player.sin || 0) + 2;
        game.player.gold += 60;
        game.player.exp += 35;
        floor.map[y][x] = TILE.FLOOR;
        addStory('击杀灰婴', '你选择直接击杀灰婴。胎室安静下来，但灰烬钻进墙缝，像没有真正死去。');
        addLog('你击杀了灰婴，获得灰烬之钥、60 金币、35 经验，罪痕 +2。', 'battle');
        hideModal();
        movePlayer(x, y);
        showModal('灰烬之钥', '<p>灰婴碎裂成一枚烫手的灰烬之钥。</p><p>道路变得安静，但这种安静并不意味着平息。</p>');
      }
    }

    function triggerBellAt(x, y) {
      const floor = currentFloor();
      floor.bellCount = (floor.bellCount || 0) + 1;
      const memories = [
        '钟声里，你看见年轻的罗维克站在塔门前。他不是被迫进入，而是在等待某个回应。',
        '第二声钟响后，你听见婴儿的哭声。罗维克说：我只是想让这个家活下去。',
        '第三声钟响后，幻象碎裂。伊莲抱着米娅逃向塔内，身后的人影没有追怪物，而是在追她们。'
      ];
      const text = memories[Math.min(floor.bellCount - 1, memories.length - 1)];
      if (floor.bellCount <= 3) {
        game.player.truthFragments = (game.player.truthFragments || 0) + 1;
        addStory('忏悔钟声', text);
        addLog(`忏悔钟响起：真相碎片 +1。`, 'gold');
      } else {
        addLog('钟声再次响起，但只剩回音。', 'info');
      }
      const spawnPoints = [[4,1], [5,4], [4,7]];
      const point = spawnPoints[Math.min(floor.bellCount - 1, spawnPoints.length - 1)];
      if (point && floor.map[point[1]] && floor.map[point[1]][point[0]] === TILE.FLOOR) {
        floor.map[point[1]][point[0]] = floor.bellCount >= 3 ? 'z' : 'v';
        addLog('钟声唤醒了新的守卫。', 'battle');
      }
      showModal('忏悔钟', `<p>${escapeHTML(text)}</p><p>钟声会给予真相，也会刷新怪物。</p>`);
      render();
    }

    function triggerEventAt(x, y) {
      const floor = currentFloor();
      const key = `${x},${y}`;
      const evt = floor.events && floor.events[key];
      if (!evt || evt.done) return;

      evt.done = true;
      if (evt.truth) game.player.truthFragments = (game.player.truthFragments || 0) + evt.truth;
      if (evt.blessing) applyBlessing(evt.blessing);
      if (evt.log) addStory(evt.title, evt.log);
      addLog(evt.truth ? `发现真相碎片：${evt.title}` : `调查：${evt.title}`, evt.truth ? 'gold' : 'info');
      floor.map[y][x] = TILE.FLOOR;
      showModal(evt.title, `<p>${escapeHTML(evt.text)}</p>${evt.truth ? '<p>真相碎片 +1</p>' : ''}`);
      render();
    }

    function addStory(title, text) {
      if (!game.storyLog) game.storyLog = [];
      game.storyLog.unshift({ floor: currentFloor().id, title, text });
      game.storyLog = game.storyLog.slice(0, 30);
    }

    function showStoryLog() {
      const logs = game.storyLog || [];
      if (!logs.length) {
        showModal('剧情日志', '<p>尚未发现重要剧情。</p>');
        return;
      }
      const html = logs.map(item => `
        <div class="hint-box" style="margin-bottom:8px;">
          <b>${item.floor}F · ${escapeHTML(item.title)}</b><br>
          ${escapeHTML(item.text)}
        </div>
      `).join('');
      showModal('剧情日志', html);
    }

    function serializeGame() {
      return {
        version: 5,
        savedAt: new Date().toISOString(),
        floors: game.floors,
        player: game.player,
        seenMonsters: Array.from(game.seenMonsters),
        inspected: game.inspected,
        alive: game.alive,
        finished: game.finished,
        logs: game.logs,
        storyLog: game.storyLog || [],
        startTime: game.startTime || Date.now(),
        ending: game.ending || null,
        settings: game.settings || { dangerConfirm: true }
      };
    }

    function restoreGame(data) {
      game = {
        floors: Array.isArray(data.floors) ? data.floors : FLOOR_DEFS.map(def => ({
          id: def.id,
          name: def.name,
          intro: def.intro,
          map: parseMap(def.map),
          visited: false
        })),
        player: { ...initialPlayer, ...(data.player || {}) },
        seenMonsters: new Set(data.seenMonsters || []),
        storyLog: Array.isArray(data.storyLog) ? data.storyLog : [],
        startTime: data.startTime || Date.now(),
        ending: data.ending || null,
        settings: data.settings || { dangerConfirm: false },
        inspected: data.inspected || { x: 1, y: 1 },
        alive: data.alive !== false,
        finished: data.finished === true,
        logs: Array.isArray(data.logs) ? data.logs : [],
        autoMove: null
      };
    }

    function saveCheckpoint(label) {
      try {
        const data = serializeGame();
        data.checkpointLabel = label;
        data.savedAt = new Date().toISOString();
        localStorage.setItem(CHECKPOINT_KEY, JSON.stringify(data));
        updateSaveStatus(`检查点：${label} ${formatTime(new Date(data.savedAt))}`);
      } catch (err) {
        addLog('检查点保存失败。', 'bad');
      }
    }

    function loadCheckpoint() {
      try {
        const raw = localStorage.getItem(CHECKPOINT_KEY);
        if (!raw) {
          addLog('没有找到检查点。', 'bad');
          suppressNextAutoSave = true;
          render();
          return;
        }
        const data = JSON.parse(raw);
        restoreGame(data);
        addLog(`已读取检查点：${data.checkpointLabel || '未命名'}`, 'info');
        suppressNextAutoSave = true;
        render();
      } catch (err) {
        addLog('读取检查点失败。', 'bad');
        suppressNextAutoSave = true;
        render();
      }
    }

    function saveGame(manual = true) {
      if (!game) return false;
      try {
        const data = serializeGame();
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        updateSaveStatus(`${manual ? '手动保存' : '自动保存'}：${formatTime(new Date(data.savedAt))}`);
        if (manual) {
          addLog('游戏已保存到本地浏览器。', 'good');
          suppressNextAutoSave = true;
          render();
        }
        return true;
      } catch (err) {
        updateSaveStatus('保存失败：浏览器可能限制了 localStorage');
        if (manual) {
          addLog('保存失败：浏览器可能限制了 localStorage。', 'bad');
          suppressNextAutoSave = true;
          render();
        }
        return false;
      }
    }

    function loadGame(manual = true) {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) {
          if (manual) {
            addLog('没有找到本地存档。', 'bad');
            suppressNextAutoSave = true;
            render();
          }
          return false;
        }
        const data = JSON.parse(raw);
        restoreGame(data);
        addLog(manual ? '已读取本地存档。' : '已自动读取上次存档。', 'info');
        suppressNextAutoSave = true;
        render();
        updateSaveStatus(`已读取：${formatTime(new Date(data.savedAt || Date.now()))}`);
        return true;
      } catch (err) {
        if (manual) {
          addLog('读取失败：存档数据可能损坏。', 'bad');
          suppressNextAutoSave = true;
          render();
        }
        updateSaveStatus('读取失败');
        return false;
      }
    }

    function clearSave() {
      try {
        localStorage.removeItem(SAVE_KEY);
        addLog('本地存档已清除。当前局仍在内存中，下一次移动或保存会重新生成存档。', 'info');
        suppressNextAutoSave = true;
        render();
        updateSaveStatus('存档状态：已清除');
      } catch (err) {
        addLog('清除存档失败。', 'bad');
        suppressNextAutoSave = true;
        render();
      }
    }

    function updateSaveStatus(text) {
      const el = document.getElementById('saveStatus');
      if (el) el.textContent = `存档状态：${text}`;
    }

    function formatTime(date) {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return '未知时间';
      const pad = n => String(n).padStart(2, '0');
      return `${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function toggleDangerConfirm() {
      if (!game.settings) game.settings = { dangerConfirm: true };
      game.settings.dangerConfirm = !game.settings.dangerConfirm;
      addLog(`危险战斗确认已${game.settings.dangerConfirm ? '开启' : '关闭'}。`, 'info');
      render();
    }

    function updateConfirmToggleText() {
      const btn = document.getElementById('confirmToggleBtn');
      if (!btn || !game) return;
      const on = !game.settings || game.settings.dangerConfirm;
      btn.textContent = `战斗确认：${on ? '开' : '关'}`;
    }

    function hasTile(floor, tile) {
      return floor.map && floor.map.some(row => row.includes(tile));
    }

    function showBalanceReport() {
      const p = game.player;
      let totalKeys = p.yellowKeys;
      let totalDoors = 0;
      let totalPotions = 0;
      let totalGems = 0;
      let totalMonsters = 0;
      let beatableVisible = 0;
      let totalVisibleLoss = 0;
      const rows = game.floors.map(floor => {
        const counts = countFloorTiles(floor);
        const monsterTiles = Object.keys(counts).filter(t => isMonsterTile(t));
        const monsterCount = monsterTiles.reduce((sum, t) => sum + counts[t], 0);
        const beatable = monsterTiles.reduce((sum, t) => {
          const preview = battlePreview(getMonster(t));
          return sum + (preview.canWin ? counts[t] : 0);
        }, 0);
        const loss = monsterTiles.reduce((sum, t) => {
          const preview = battlePreview(getMonster(t));
          return sum + (preview.canWin ? preview.loss * counts[t] : 0);
        }, 0);
        totalKeys += counts.K || 0;
        totalDoors += counts.Y || 0;
        totalPotions += (counts.H || 0) + (counts.V || 0);
        totalGems += (counts.A || 0) + (counts.D || 0);
        totalMonsters += monsterCount;
        beatableVisible += beatable;
        totalVisibleLoss += loss;
        const net = (counts.K || 0) - (counts.Y || 0);
        const risk = net < -2 ? '钥匙压力高' : monsterCount > beatable ? '存在强敌' : '正常';
        return `
          <tr>
            <td>${floor.id}F</td>
            <td>${floor.name}</td>
            <td>${monsterCount}</td>
            <td>${beatable}/${monsterCount}</td>
            <td>${counts.K || 0}/${counts.Y || 0}</td>
            <td>${totalTileCount(counts, ['H','V'])}</td>
            <td>${totalTileCount(counts, ['A','D'])}</td>
            <td>${risk}</td>
          </tr>
        `;
      }).join('');

      const warnings = [];
      if (totalKeys < totalDoors) warnings.push(`黄钥匙总量可能偏紧：当前+剩余黄钥匙 ${totalKeys}，剩余黄门 ${totalDoors}。`);
      if (p.hp < totalVisibleLoss * 0.2) warnings.push('当前生命偏低，建议优先拿血瓶或提升防御。');
      if (beatableVisible < Math.max(1, Math.floor(totalMonsters * 0.45))) warnings.push('当前可击败怪物比例偏低，可能需要调整怪物数值或增加前期宝石。');
      if (!p.babyChoice && currentFloor().id > 14) warnings.push('警告：已超过第 14 层但未记录灰婴选择，可能是测试跳层导致。');
      if (!p.finalChoice && currentFloor().id > 18) warnings.push('警告：已超过第 18 层但未记录最终选择，可能是测试跳层导致。');
      const warningHtml = warnings.length ? warnings.map(w => `<p class="bad">${escapeHTML(w)}</p>`).join('') : '<p class="good">当前未发现明显数值风险。</p>';

      showModal('平衡报告', `
        <p>当前属性：HP ${p.hp} / ATK ${p.atk} / DEF ${p.def} / 黄钥匙 ${p.yellowKeys} / 罪痕 ${p.sin || 0}</p>

        ${warningHtml}
      `);
    }

    function initAudio() {
      if (AUDIO.ctx) return true;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) {
        addLog('当前浏览器不支持 WebAudio。', 'bad');
        return false;
      }

      AUDIO.ctx = new AudioContext();
      AUDIO.master = AUDIO.ctx.createGain();
      AUDIO.musicGain = AUDIO.ctx.createGain();
      AUDIO.sfxGain = AUDIO.ctx.createGain();

      AUDIO.master.gain.value = 0.55;
      AUDIO.musicGain.gain.value = 0.12;
      AUDIO.sfxGain.gain.value = 0.25;

      AUDIO.musicGain.connect(AUDIO.master);
      AUDIO.sfxGain.connect(AUDIO.master);
      AUDIO.master.connect(AUDIO.ctx.destination);
      return true;
    }

    function resumeAudio() {
      if (!initAudio()) return false;
      if (AUDIO.ctx.state === 'suspended') AUDIO.ctx.resume();
      return true;
    }

    function playTone(freq, dur = 0.08, type = 'square', volume = 0.2, delay = 0, target = 'sfx') {
      if (!AUDIO.enabled && target !== 'music') return;
      if (!AUDIO.ctx) return;
      if (!freq) return;

      const t = AUDIO.ctx.currentTime + delay;
      const osc = AUDIO.ctx.createOscillator();
      const gain = AUDIO.ctx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);

      osc.connect(gain);
      gain.connect(target === 'music' ? AUDIO.musicGain : AUDIO.sfxGain);
      osc.start(t);
      osc.stop(t + dur + 0.03);
    }

    function playNoise(dur = 0.12, volume = 0.18, delay = 0) {
      if (!AUDIO.enabled || !AUDIO.ctx) return;
      const sr = AUDIO.ctx.sampleRate;
      const buffer = AUDIO.ctx.createBuffer(1, Math.floor(sr * dur), sr);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      }
      const source = AUDIO.ctx.createBufferSource();
      const gain = AUDIO.ctx.createGain();
      gain.gain.value = volume;
      source.buffer = buffer;
      source.connect(gain);
      gain.connect(AUDIO.sfxGain);
      source.start(AUDIO.ctx.currentTime + delay);
    }

    function playSfx(name) {
      if (!AUDIO.enabled) return;

      if (name === 'pickup') {
        playTone(659.25, .055, 'square', .20, 0);

      } else if (name === 'door') {
        playTone(196, .08, 'triangle', .22, 0);
        playTone(246.94, .08, 'triangle', .18, .07);
        playTone(329.63, .10, 'triangle', .16, .14);
      } else if (name === 'battle') {
        playNoise(.10, .18, 0);
        playTone(146.83, .08, 'sawtooth', .20, 0);
        playTone(98, .08, 'square', .14, .09);
      } else if (name === 'stairs') {
        playTone(261.63, .06, 'square', .18, 0);
        playTone(329.63, .06, 'square', .16, .06);
        playTone(392, .08, 'square', .14, .12);
      } else if (name === 'error') {
        playTone(196, .09, 'square', .20, 0);
        playTone(146.83, .12, 'square', .17, .09);
      } else if (name === 'confirm') {
        playTone(523.25, .055, 'square', .14, 0);

      } else if (name === 'choice') {
        playTone(220, .18, 'triangle', .18, 0);
        playTone(261.63, .18, 'triangle', .12, .02);
        playTone(329.63, .18, 'triangle', .10, .04);
      } else if (name === 'text') {

      } else if (name === 'boss') {
        playTone(82.41, .28, 'sawtooth', .22, 0);
        playTone(110, .28, 'sawtooth', .12, .03);
        playNoise(.20, .11, .02);
      }
    }

    function startBgm() {
      if (!AUDIO.enabled || !AUDIO.bgmOn || !AUDIO.ctx) return;
      stopBgm();
      AUDIO.step = AUDIO.step || 0;
      AUDIO.bgmTimer = setInterval(() => {
        if (!AUDIO.enabled || !AUDIO.bgmOn) return;
        const note = BGM_NOTES[AUDIO.step % BGM_NOTES.length];
        const bass = BGM_BASS[AUDIO.step % BGM_BASS.length];

        if (note) playTone(note, .11, 'square', .10, 0, 'music');
        if (AUDIO.step % 4 === 0 && bass) playTone(bass, .22, 'triangle', .10, 0, 'music');
        if (AUDIO.step % 8 === 4) playTone(523.25, .04, 'square', .035, .03, 'music');

        AUDIO.step += 1;
      }, AUDIO.tempo);
    }

    function stopBgm() {
      if (AUDIO.bgmTimer) clearInterval(AUDIO.bgmTimer);
      AUDIO.bgmTimer = null;

    let typewriterState = {

    function showModal(title, html, options = {}) {
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');
      const mask = document.getElementById('modalMask');
      const portraitBox = document.getElementById('dialogPortrait');
      const speedLabel = document.getElementById('typeSpeedLabel');

      if (typewriterState.timer) clearInterval(typewriterState.timer);

      const oldPortrait = typeof getModalPortrait === 'function' ? getModalPortrait(title) : '';
      const fullHTML = `${oldPortrait ? `<div class="modal-art modal-art-${oldPortrait}"></div>` : ''}${html}`;
      const isUtilityWindow = title === '设置' || /settings-grid|settings-group|action-btn|monster-card|balance-report|final-check/.test(html);

      modalTitle.textContent = title;
      if (portraitBox) portraitBox.textContent = options.portrait || inferPortrait(title);
      if (speedLabel) speedLabel.textContent = isUtilityWindow ? '速度：即时' : '速度：普通';

      typewriterState.fullHTML = fullHTML;
      typewriterState.plainText = stripHTML(fullHTML).replace(/\n\s+/g, '\n').trim();
      typewriterState.index = 0;
      typewriterState.speed = options.speed || 22;
      typewriterState.completed = isUtilityWindow;

      mask.style.display = 'flex';

      if (isUtilityWindow || options.instant) {
        modalBody.innerHTML = fullHTML;
        return;
      }

      modalBody.textContent = '';
      typewriterState.timer = setInterval(() => {
        typewriterState.index += 1;
        modalBody.textContent = typewriterState.plainText.slice(0, typewriterState.index);
        if (typewriterState.index >= typewriterState.plainText.length) finishTypewriter();
      }, typewriterState.speed);
    }

    function finishTypewriter() {
      const modalBody = document.getElementById('modalBody');
      if (typewriterState.timer) clearInterval(typewriterState.timer);
      typewriterState.timer = null;
      typewriterState.completed = true;
      modalBody.innerHTML = typewriterState.fullHTML;
    }

    function advanceDialogText() {

        typewriterState.timer = setInterval(() => {
          typewriterState.index += 2;
          document.getElementById('modalBody').textContent = typewriterState.plainText.slice(0, typewriterState.index);
          if (typewriterState.index % 4 === 0) playSfx('text');
          if (typewriterState.index >= typewriterState.plainText.length) finishTypewriter();
        }, typewriterState.speed);
        const speedLabel = document.getElementById('typeSpeedLabel');
        if (speedLabel) speedLabel.textContent = '速度：快';
        return;
      }
      if (!typewriterState.completed) {
        finishTypewriter();
        return;
      }
      hideModal();
    }

    function initTouchMapControls() {
      const mapEl = document.getElementById('map');
      if (!mapEl || mapEl.dataset.touchReady === '1') return;
      mapEl.dataset.touchReady = '1';

      let startX = 0;
      let startY = 0;
      let startTime = 0;

      mapEl.addEventListener('touchstart', (e) => {

        startY = e.touches[0].clientY;

      }, { passive: true });

      mapEl.addEventListener('touchend', (e) => {
        if (isModalOpen()) return;
        if (!e.changedTouches || e.changedTouches.length !== 1) return;

        const dx = e.changedTouches[0].clientX - startX;
        const dy = e.changedTouches[0].clientY - startY;
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);
        const elapsed = Date.now() - startTime;

        if (elapsed > 900) return;
        if (Math.max(absX, absY) < 28) return;

        e.preventDefault();

        if (absX > absY) {
          tryMove(dx > 0 ? 1 : -1, 0);
        } else {
          tryMove(0, dy > 0 ? 1 : -1);
        }
      }, { passive: false });
    }
    function stopHoldMove() {
      if (holdTimer) clearInterval(holdTimer);
      holdTimer = null;
    }
    document.querySelectorAll('.ctrl-btn[data-dir]').forEach(btn => {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        const dir = btn.dataset.dir;
        moveByDir(dir);
        stopHoldMove();
        holdTimer = setInterval(() => moveByDir(dir), 180);
      });
      btn.addEventListener('pointerup', stopHoldMove);
      btn.addEventListener('pointerleave', stopHoldMove);
      btn.addEventListener('pointercancel', stopHoldMove);
    });

    document.getElementById('confirmToggleBtn').addEventListener('click', toggleDangerConfirm);
    document.getElementById('checkpointBtn').addEventListener('click', loadCheckpoint);
    document.getElementById('finalCheckBtn').addEventListener('click', showFinalCheck);
    document.getElementById('balanceBtn').addEventListener('click', showBalanceReport);
    document.getElementById('storyLogBtn').addEventListener('click', showStoryLog);
    document.getElementById('settingsBtn').addEventListener('click', showSettingsPanel);
    document.getElementById('saveBtn').addEventListener('click', () => saveGame(true));
    document.getElementById('loadBtn').addEventListener('click', () => loadGame(true));
    document.getElementById('clearSaveBtn').addEventListener('click', () => {
      if (confirm('确定清除本地存档？当前页面中的游戏不会立刻消失，但刷新后将无法读取旧进度。')) clearSave();
    });
    document.getElementById('monsterBookBtn').addEventListener('click', showMonsterBook);

    document.getElementById('restartBtn').addEventListener('click', () => {
      if (confirm('确定重新开始美术资源接入版？')) newGame();
    });

    document.getElementById('helpBtn').addEventListener('click', () => {
      showModal('玩法说明', '<p>目标是探索 20 层灰塔，完成关键选择并抵达结局。</p><p>原版交互：一步一格移动；撞到墙会提示；走进钥匙、血瓶、宝石会拾取；走进门会消耗钥匙；走进怪物会自动结算战斗；点击远处只查看信息。</p><p>本版本已接入内嵌 SVG 美术资源，单文件即可运行。</p>');
    });

    document.getElementById('formulaBtn').addEventListener('click', () => {
      showModal('战斗公式', '<p>玩家每回合伤害 = max(玩家攻击 - 怪物防御, 1)</p><p>怪物每回合伤害 = max(怪物攻击 - 玩家防御, 0)</p><p>击杀回合数 = ceil(怪物生命 / 玩家每回合伤害)</p><p>玩家损血 = 怪物每回合伤害 × (击杀回合数 - 1)</p>');
    });

    document.getElementById('modalClose').addEventListener('click', hideModal);
    document.getElementById('modalMask').addEventListener('click', (e) => {
      if (e.target.id === 'modalMask') hideModal();
    });

    function bootGame() {
      if (!loadGame(false)) newGame();
    }

    bootGame();
  </script>
</body>
</html>
